<h4 class="eyebrow-label">La lignée</h4>

    <div class="card-container">
        <mat-card [routerLink]="['/males', '/chatons', '/femelles'][i]"
            *ngFor="let card of [bannerSection?.titleCard1, bannerSection?.titleCard2, bannerSection?.titleCard3]; let i = index">

            <img mat-card-image
                [src]="i === 0 ? 'assets/males-card.jpg' : i === 1 ? 'assets/chatons-card.jpg' : 'assets/femelles-card.jpg'"
                alt="Card Image">

            <span class="card-badge" [ngStyle]="dynamicStylesTitle">{{ card }}</span>

            <mat-card-content [ngStyle]="dynamicStylesText">{{ i === 0 ? bannerSection?.maleDescription : i === 1 ?
                bannerSection?.kittenDescription : bannerSection?.femaleDescription }}</mat-card-content>
            <a [routerLink]="['/males', '/chatons', '/femelles'][i]" class="frame-link">+ d'infos →</a>
        </mat-card>
    </div>

<div class="breadcrumb">
    <a routerLink="/">Accueil</a><span class="sep">›</span><span class="current">Nos femelles</span>
</div>

<div class="image-container">
    <div [ngClass]="getGridClass(cats.length)">
        <div class="frame-card" *ngFor="let cat of cats">
            <div class="frame-photo-ring">
                <img [src]="url.apiUrlImgProfilCat + cat.urlProfil" #roundedImage (load)="onImageLoad()" class="rounded-image"
                    (click)="redirectToNewUrl(cat.id, cat)">
                <div class="photo-hover" (click)="redirectToNewUrl(cat.id, cat)"><span>Voir sa fiche →</span></div>
            </div>
            <p class="name">{{ cat.name }}</p>
            <span class="robe-chip">{{ cat.robe }}</span>
            <p class="quick-facts">{{ getAge(cat.dateOfBirth) }} · Yeux {{ cat.eyeColor }}</p>
            <a class="frame-link" (click)="redirectToNewUrl(cat.id, cat)">En savoir plus →</a>
        </div>
    </div>
</div>

<div class="scallop-down"></div>
<div class="description">
    <h3 [ngStyle]="dynamicStyles.title">{{banner.titlePageFemelles}}</h3>
    <p [ngStyle]="dynamicStyles.text">{{banner.textPageFemelles}}</p>
</div>
<div class="scallop-up"></div>

<div class="cta-cross">
    <p class="eyebrow-label">Envie de plus ?</p>
    <h2>Découvrez nos chatons disponibles</h2>
    <a routerLink="/chatons" class="btn-gold">Voir les chatons →</a>
</div>

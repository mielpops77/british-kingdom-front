<div class="admin-page">
  <div class="page-header">
    <div>
      <p class="eyebrow-label">Gestion</p>
      <h1>Nos portées</h1>
    </div>
    <a routerLink="/admin/portees/new" class="add-btn">+ Ajouter</a>
  </div>

  <div class="tabs">
    <button class="tab-btn" [class.active]="activeTab === 'actives'" (click)="activeTab = 'actives'">
      Portées actives
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'anciennes'" (click)="activeTab = 'anciennes'">
      Anciennes portées
    </button>
  </div>

  <div class="portee-list">
    <div class="portee-row" *ngFor="let portee of displayedPortees">
      <a [routerLink]="['/admin/portees', portee.id, 'edit']" class="portee-row-link">
        <img *ngIf="hasPhoto(portee.urlProfilMother)" [src]="url.apiUrlImgProfilCat + portee.urlProfilMother" [alt]="portee.name" class="portee-photo">
        <div *ngIf="!hasPhoto(portee.urlProfilMother)" class="portee-photo-placeholder">
          <svg class="paw-icon" viewBox="0 0 64 64" aria-hidden="true">
            <ellipse cx="32" cy="42" rx="15" ry="12"/>
            <ellipse cx="14" cy="24" rx="7" ry="8.5"/>
            <ellipse cx="30" cy="14" rx="7" ry="8.5"/>
            <ellipse cx="47" cy="18" rx="7" ry="8.5"/>
            <ellipse cx="54" cy="33" rx="6.5" ry="8"/>
          </svg>
        </div>
        <div class="portee-info">
          <span class="portee-name">{{ portee.name }}</span>
          <span class="portee-meta">
            {{ portee.chatons?.length || 0 }} chaton(s) · {{ portee.disponible ? 'Disponible' : 'Non disponible' }}
          </span>
        </div>
      </a>
      <div class="portee-actions">
        <button class="archive-btn" (click)="toggleArchive(portee)" [disabled]="archivingId === portee.id">
          {{ archivingId === portee.id ? '...' : (portee.archivee ? 'Réactiver' : 'Archiver') }}
        </button>
        <button class="delete-btn" (click)="confirmDelete(portee)" [disabled]="deletingId === portee.id">
          {{ deletingId === portee.id ? '...' : 'Supprimer' }}
        </button>
      </div>
    </div>
  </div>

  <p *ngIf="!displayedPortees.length" class="hint">
    {{ activeTab === 'anciennes' ? 'Aucune ancienne portée archivée.' : 'Aucune portée active pour le moment.' }}
  </p>
</div>

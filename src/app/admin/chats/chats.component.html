<div class="admin-page">
  <div class="page-header">
    <div>
      <p class="eyebrow-label">Gestion</p>
      <h1>Nos chats</h1>
    </div>
    <a routerLink="/admin/chats/new" class="add-btn">+ Ajouter</a>
  </div>

  <div class="cat-list">
    <div class="cat-row" *ngFor="let cat of cats">
      <a [routerLink]="['/admin/chats', cat.id, 'edit']" class="cat-row-link">
        <img [src]="url.apiUrlImgProfilCat + cat.urlProfil" [alt]="cat.name" class="cat-photo">
        <div class="cat-info">
          <span class="cat-name">{{ cat.name }}</span>
          <span class="cat-meta">{{ cat.sex }} · {{ cat.robe }}</span>
        </div>
      </a>
      <button class="delete-btn" (click)="confirmDelete(cat)" [disabled]="deletingId === cat.id">
        {{ deletingId === cat.id ? '...' : 'Supprimer' }}
      </button>
    </div>
  </div>

  <p *ngIf="!cats.length" class="hint">Aucun chat pour le moment.</p>
</div>
